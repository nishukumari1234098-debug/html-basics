<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="product.css">
</head>
<body>
    <div class="product-card">

          <div class="image-container">
            <img src="sunglasses.jpeg" height="300px" width="300px" alt="Premium Sunglasses" class="product-image">
            <div class="sale-badge">30% OFF</div>
            <button class="wishlist-btn"></button>
          </div>

          <div class="card-body">
            <div class="category">FASHION</div>

            <h2 class="product-name">Classic Aviator Sunglasses</h2>

            <div class="rating">
                <span class="stars">★★★★★</span>
                <span class="rating-text">4.9(1,234 reviews)</span>
            </div>
            <p class="description">Premium polarized sunglasses with UV400 protection. Features lightweight titanium frame and scratch-resistant lenses for ultimate style and comfort.</p>

            <div class="price-section">
                <span class="current-price">$89.99</span>
                <span class="old-price">$129.99</span>
                <span class="discount-badge">Save $40</span>
            </div>

            <button class="add-to-cart-btn">🛒Add to Cart</button>

            <div class="stock-status">
                <div class="stock-dot"></div>
                <span class="stock-text">In Stock - Fast Shipping Available</span>
            </div>

          </div>

    </div>
</body>
</html>
