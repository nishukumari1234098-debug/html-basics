<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="form.css">
</head>
<body>
    <div>
         <form action="submit_feedback">
            
                <legend><b>Feedback Form📝 </b></legend>

           <div class="form-div">
             <label for="name" class="name">Full Name:</label><br>
            <input type="text" class="name-inp" id="name" name="name" placeholder="Enter your full name"><br><br>

            
            <label for="email" class="name">Email Address:</label><br>
            <input type="email" class="name-inp" id="email" placeholder="your.email@example.com">
            <br><br>


            <label for="feedback" class="name">Feedback Type:</label><br>
            <select name="type" class="name-inp" id="type">
                <option value="#">Select a type</option>
                <option value="#">General Feedback</option>
                <option value="#">suggestions</option>
                <option value="#">Bug Report</option>
                <option value="#">Complaint</option>
                <option value="#">Praise</option>
                <option value="#">Other</option>
            </select><br><br>


            <label for="rate" class="name">Overall Rating:</label><br>
            <div class="rio">
                <input type="radio" id="excellent" name="rate" value="excellent">
                <label for="excellent">Excellent</label><br>
                <input type="radio" id="good" name="rate" value="good">
                <label for="good">Good</label><br>
                <input type="radio" name="rate" id="average" value="average">
                <label for="average">Average</label><br>
                <input type="radio" name="rate" id="poor" value="poor">
                <label for="poor">Poor</label><br>
                <input type="radio" name="rate" id="bad" value="bad">
                <label for="bad">Very Poor</label><br>
            </div><br><br>


            <label for="choose" class="name">Which areas would you like to comment on? (Select all that apply)</label><br>
            <div class="rio">
                <input type="checkbox" name="design" id="design">
                <label for="design">Website Design</label><br>
                <input type="checkbox" name="navigate" id="navigate">
                <label for="navigate">Navigation</label><br>
                <input type="checkbox" name="content" id="content">
                <label for="content">Content Quality</label><br>
                <input type="checkbox" name="function" id="function">
                <label for="function">Functionality</label><br>
                <input type="checkbox" name="perform" id="perform">
                <label for="perform">Performance</label><br>
            </div><br>

            <label for="feedback" class="name">Your Feedback:</label><br>
            <textarea name="feedback" class="text-feed" id="feedback" placeholder="Pleasae share your detailed feedbaack here...."></textarea><br>
            <small class="para"><i>Minimum 20 characters required</i></small><br><br>
            <input type="checkbox" name="ensure" id="ensure">
            <label for="ensure" class="name">I would like to receive updates about this portal</label><br><br>

            <button>Submit Feedback</button><br>
            <small class="para"><i>Note: This is a demonstration form. Data will not be saved or sent anywhere.</i></small>
       
           </div>
            
        </form>
    </div>
</body>
</html>
